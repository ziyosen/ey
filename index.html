<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieHub 18+ | Premium Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .plus-badge { background: #ef4444; border: 2px solid #fff; border-radius: 50%; width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; box-shadow: 0 0 15px rgba(239, 68, 68, 0.6); margin-left: 6px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-genre { background: #ef4444 !important; border-color: #ef4444 !important; }
        .movie-card img { transition: all 0.4s ease; }
        .movie-card:hover img { transform: scale(1.08); filter: brightness(0.6); }
        .shimmer { background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="pb-10">

    <nav class="glass-nav sticky top-0 z-[100] px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-1 cursor-pointer" onclick="location.reload()">
ieHub            <span class="text-2xl font-extrabold tracking-tighter uppercase italic">MovieHub<span class="plus-badge">18+</span></span>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="toggleSearch()" class="p-2.5 hover:bg-slate-800 rounded-full transition-all text-slate-400 hover:text-white"><i data-lucide="search"></i></button>
            <a href="https://t.me/Bleszh" target="_blank" class="bg-sky-600 hover:bg-sky-500 px-4 py-2 rounded-full text-xs font-bold flex items-center gap-2 transition-all shadow-lg shadow-sky-900/30">
                <i data-lucide="send" class="w-4 h-4"></i> CS TELE
            </a>
        </div>
    </nav>

    <div class="flex overflow-x-auto space-x-3 p-4 no-scrollbar bg-[#020617] sticky top-[73px] z-[90] border-b border-slate-800/50">
        <button onclick="fetchMovies('/', this)" class="genre-btn active-genre px-5 py-2 rounded-full border border-slate-700 bg-slate-900 text-[11px] font-bold whitespace-nowrap transition-all uppercase">🏠 Home</button>
        <button onclick="fetchMovies('/genre/action', this)" class="genre-btn px-5 py-2 rounded-full border border-slate-700 bg-slate-900 text-[11px] font-bold whitespace-nowrap transition-all uppercase">Action</button>
        <button onclick="fetchMovies('/genre/adventure', this)" class="genre-btn px-5 py-2 rounded-full border border-slate-700 bg-slate-900 text-[11px] font-bold whitespace-nowrap transition-all uppercase">Adventure</button>
        <button onclick="fetchMovies('/genre/animation', this)" class="genre-btn px-5 py-2 rounded-full border border-slate-700 bg-slate-900 text-[11px] font-bold whitespace-nowrap transition-all uppercase">Animation</button>
        <button onclick="fetchMovies('/genre/comedy', this)" class="genre-btn px-5 py-2 rounded-full border border-slate-700 bg-slate-900 text-[11px] font-bold whitespace-nowrap transition-all uppercase">Comedy</button>
        <button onclick="fetchMovies('/genre/crime', this)" class="genre-btn px-5 py-2 rounded-full border border-slate-700 bg-slate-900 text-[11px] font-bold whitespace-nowrap transition-all uppercase">Crime</button>
        <button onclick="fetchMovies('/genre/drama', this)" class="genre-btn px-5 py-2 rounded-full border border-slate-700 bg-slate-900 text-[11px] font-bold whitespace-nowrap transition-all uppercase">Drama</button>
        <button onclick="fetchMovies('/genre/fantasy', this)" class="genre-btn px-5 py-2 rounded-full border border-slate-700 bg-slate-900 text-[11px] font-bold whitespace-nowrap transition-all uppercase">Fantasy</button>
        <button onclick="fetchMovies('/genre/horror', this)" class="genre-btn px-5 py-2 rounded-full border border-slate-700 bg-slate-900 text-[11px] font-bold whitespace-nowrap transition-all uppercase">Horror</button>
        <button onclick="fetchMovies('/genre/romance', this)" class="genre-btn px-5 py-2 rounded-full border border-slate-700 bg-slate-900 text-[11px] font-bold whitespace-nowrap transition-all uppercase">Romance</button>
        <button onclick="fetchMovies('/genre/thriller', this)" class="genre-btn px-5 py-2 rounded-full border border-slate-700 bg-slate-900 text-[11px] font-bold whitespace-nowrap transition-all uppercase">Thriller</button>
        <button onclick="fetchMovies('/semi-jepang', this)" class="genre-btn px-5 py-2 rounded-full border border-slate-700 bg-slate-900 text-[11px] font-bold whitespace-nowrap transition-all uppercase">🔞 Semi Jepang</button>
        <button onclick="fetchMovies('/semi-korea', this)" class="genre-btn px-5 py-2 rounded-full border border-slate-700 bg-slate-900 text-[11px] font-bold whitespace-nowrap transition-all uppercase">🔞 Semi Korea</button>
        <button onclick="fetchMovies('/semi-philippines', this)" class="genre-btn px-5 py-2 rounded-full border border-slate-700 bg-slate-900 text-[11px] font-bold whitespace-nowrap transition-all uppercase">🔞 Semi Philippines</button>
        <button onclick="fetchMovies('/tv-movie', this)" class="genre-btn px-5 py-2 rounded-full border border-slate-700 bg-slate-900 text-[11px] font-bold whitespace-nowrap transition-all uppercase">📺 TV Movie</button>
    </div>

    <main class="px-5 py-6">
        <div id="loading" class="hidden grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-5">
            <div class="aspect-[2/3] rounded-2xl shimmer"></div>
            <div class="aspect-[2/3] rounded-2xl shimmer"></div>
            <div class="aspect-[2/3] rounded-2xl shimmer"></div>
            <div class="aspect-[2/3] rounded-2xl shimmer"></div>
        </div>
        <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-5">
            </div>
    </main>

    <div id="search-bar" class="fixed top-[75px] left-0 w-full px-6 py-4 bg-[#020617] z-[110] hidden border-b border-slate-800 shadow-2xl">
        <div class="flex items-center gap-3 max-w-3xl mx-auto">
            <input type="text" id="query" placeholder="Cari film apa bos?" class="flex-1 bg-slate-900 border border-slate-700 rounded-xl py-3 px-5 outline-none focus:border-red-500 transition-all text-sm">
            <button onclick="doSearch()" class="bg-red-600 px-6 py-3 rounded-xl font-bold text-sm">Cari</button>
        </div>
    </div>

    <div id="v-modal" class="fixed inset-0 z-[200] hidden bg-black flex flex-col">
        <div class="p-4 flex items-center justify-between glass-nav">
            <h2 id="v-title" class="font-bold truncate text-sm text-red-500 italic">Play...</h2>
            <button onclick="closeV()" class="bg-slate-800 p-2 rounded-full hover:bg-red-600 transition-all"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div class="flex-1 flex items-center justify-center bg-slate-950">
            <iframe id="v-frame" class="w-full h-full" allowfullscreen allow="autoplay"></iframe>
        </div>
    </div>

    <script>
        const API_URL = "https://apil.benx.workers.dev";
        lucide.createIcons();

        async function fetchMovies(endpoint, btn = null) {
            const grid = document.getElementById('movie-grid');
            const load = document.getElementById('loading');
            
            if (btn) {
                document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active-genre'));
                btn.classList.add('active-genre');
            }

            grid.innerHTML = '';
            load.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            try {
                const response = await fetch(`${API_URL}${endpoint}`);
                const res = await response.json();
                load.classList.add('hidden');

                if (res.data && res.data.length > 0) {
                    res.data.forEach(m => {
                        const div = document.createElement('div');
                        div.className = 'movie-card group cursor-pointer';
                        div.onclick = () => openPlayer(m.link, m.title);
                        div.innerHTML = `
                            <div class="relative aspect-[2/3] rounded-2xl overflow-hidden bg-slate-900 border border-slate-800 mb-3 shadow-lg">
                                <img src="${m.img || 'https://via.placeholder.com/300x450?text=No+Poster'}" class="w-full h-full object-cover">
                                <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all">
                                    <div class="bg-red-600 p-4 rounded-full shadow-xl shadow-red-900/40">
                                        <i data-lucide="play" class="fill-white w-6 h-6 text-white"></i>
                                    </div>
                                </div>
                            </div>
                            <p class="text-[11px] font-bold line-clamp-2 px-1 group-hover:text-red-500 transition-colors uppercase italic">${m.title}</p>
                        `;
                        grid.appendChild(div);
                    });
                    lucide.createIcons();
                } else {
                    grid.innerHTML = `<div class="col-span-full text-center py-24 text-slate-500 text-sm">Data kosong bos, pilih genre lain.</div>`;
                }
            } catch (err) {
                load.classList.add('hidden');
                alert("API Error! Cek Workers lu bos.");
            }
        }

        async function openPlayer(link, title) {
            const modal = document.getElementById('v-modal');
            const frame = document.getElementById('v-frame');
            document.getElementById('v-title').innerText = title;
            
            modal.classList.remove('hidden');
            frame.src = "about:blank"; 

            try {
                const response = await fetch(`${API_URL}/detail?url=${encodeURIComponent(link)}`);
                const res = await response.json();
                if (res.streams && res.streams.length > 0) {
                    frame.src = res.streams[0];
                } else {
                    alert("Aduh, Link mampet bos!");
                    closeV();
                }
            } catch {
                alert("Gagal ambil link video!");
                closeV();
            }
        }

        function closeV() {
            document.getElementById('v-modal').classList.add('hidden');
            document.getElementById('v-frame').src = "";
        }

        function toggleSearch() {
            const s = document.getElementById('search-bar');
            s.classList.toggle('hidden');
        }

        function doSearch() {
            const q = document.getElementById('query').value;
            if (q) {
                fetchMovies(`/search?q=${encodeURIComponent(q)}`);
                toggleSearch();
            }
        }

        // Init load
        fetchMovies('/');
    </script>
</body>
</html>
