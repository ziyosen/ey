<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieHub 18+ | Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .plus-18 { border: 1.5px solid #ff4d4d; border-radius: 50%; padding: 1px 5px; font-size: 12px; color: #ff4d4d; font-weight: 800; margin-left: 5px; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .dropdown-content { display: none; opacity: 0; transform: translateY(-10px); transition: all 0.3s ease; }
        .dropdown-content.active { display: grid; opacity: 1; transform: translateY(0); }
        .movie-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .movie-card:hover { transform: translateY(-8px); }
        .stop-scroll { height: 100vh; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="pb-20 no-scrollbar">

    <nav class="sticky top-0 z-[100] glass border-b border-white/5 px-4 py-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic tracking-tighter">MOVIEHUB<span class="plus-18">18+</span></h1>
            <div class="flex items-center gap-5">
                <a href="https://t.me/Bleszh" target="_blank" class="text-[#24A1DE] text-2xl hover:scale-110 transition">
                    <i class="fab fa-telegram"></i>
                </a>
                <button onclick="toggleSearch()" class="text-slate-400 hover:text-white transition">
                    <i class="fas fa-search text-xl"></i>
                </button>
            </div>
        </div>
    </nav>

    <div id="search-bar" class="hidden container mx-auto px-4 mt-4 animate-fade-in">
        <div class="relative flex items-center">
            <input type="text" id="query" placeholder="Ketik judul film..." class="w-full bg-slate-900 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:ring-1 focus:ring-blue-500 transition">
            <button onclick="searchMovie()" class="absolute right-4 bg-blue-600 text-white px-5 py-2 rounded-xl font-bold text-xs uppercase tracking-widest">Cari</button>
        </div>
    </div>

    <div class="container mx-auto px-4 py-6 flex flex-wrap gap-3 items-center">
        <button onclick="loadContent('')" class="bg-blue-600 px-6 py-3 rounded-2xl text-[11px] font-black uppercase tracking-widest hover:bg-blue-500 transition shadow-lg shadow-blue-900/20">
            <i class="fas fa-home mr-2"></i> HOME
        </button>

        <div class="relative">
            <button onclick="toggleDrop('drop-genre')" class="bg-slate-800 border border-white/5 px-5 py-3 rounded-2xl text-[11px] font-bold uppercase tracking-widest flex items-center gap-3 hover:bg-slate-700 transition">
                Genre <i class="fas fa-chevron-down text-[9px] opacity-50"></i>
            </button>
            <div id="drop-genre" class="dropdown-content absolute left-0 mt-3 w-64 glass border border-white/10 rounded-2xl p-4 grid-cols-2 gap-3 z-[90] shadow-2xl">
                <script>
                    const genres = ['Action', 'Adventure', 'Animation', 'Comedy', 'Crime', 'Drama', 'Fantasy', 'Family', 'Horror', 'Mystery', 'Romance', 'Sci-Fi', 'Thriller', 'War', 'Western'];
                    document.write(genres.map(g => `<button onclick="loadContent('genre/${g.toLowerCase()}');" class="text-left text-[10px] font-bold text-slate-400 hover:text-blue-500 transition uppercase">${g}</button>`).join(''));
                </script>
            </div>
        </div>

        <div class="relative">
            <button onclick="toggleDrop('drop-country')" class="bg-slate-800 border border-white/5 px-5 py-3 rounded-2xl text-[11px] font-bold uppercase tracking-widest flex items-center gap-3 hover:bg-slate-700 transition">
                Negara <i class="fas fa-chevron-down text-[9px] opacity-50"></i>
            </button>
            <div id="drop-country" class="dropdown-content absolute left-0 mt-3 w-48 glass border border-white/10 rounded-2xl p-4 grid-cols-1 gap-4 z-[90] shadow-2xl">
                <button onclick="loadContent('country/korea')" class="text-left text-[10px] font-bold hover:text-green-400 transition uppercase">🇰🇷 Korea</button>
                <button onclick="loadContent('country/japan')" class="text-left text-[10px] font-bold hover:text-green-400 transition uppercase">🇯🇵 Japan</button>
                <button onclick="loadContent('country/thailand')" class="text-left text-[10px] font-bold hover:text-green-400 transition uppercase">🇹🇭 Thailand</button>
                <button onclick="loadContent('country/hong-kong')" class="text-left text-[10px] font-bold hover:text-green-400 transition uppercase">🇭🇰 Hong Kong</button>
            </div>
        </div>

        <div class="relative">
            <button onclick="toggleDrop('drop-semi')" class="bg-red-950/20 border border-red-500/30 px-5 py-3 rounded-2xl text-[11px] font-bold text-red-400 uppercase tracking-widest flex items-center gap-3 hover:bg-red-900/30 transition">
                <i class="fas fa-fire-alt text-[10px]"></i> SEMI 18+
            </button>
            <div id="drop-semi" class="dropdown-content absolute left-0 mt-3 w-56 glass border border-red-500/20 rounded-2xl p-4 grid-cols-1 gap-4 z-[90] shadow-2xl">
                <button onclick="loadContent('semi-jepang')" class="text-left text-[10px] font-bold hover:text-red-500 transition uppercase">🇯🇵 Semi Jepang</button>
                <button onclick="loadContent('semi-korea')" class="text-left text-[10px] font-bold hover:text-red-500 transition uppercase">🇰🇷 Semi Korea</button>
                <button onclick="loadContent('semi-philippines')" class="text-left text-[10px] font-bold hover:text-red-500 transition uppercase">🇵🇭 Semi Philippines</button>
            </div>
        </div>
    </div>

    <main class="container mx-auto px-4 mt-4">
        <h2 id="section-title" class="text-xs font-black uppercase tracking-[0.4em] text-slate-500 mb-8 flex items-center gap-3">
            <span class="w-1.5 h-1.5 bg-blue-600 rounded-full animate-pulse"></span> TERBARU
        </h2>
        <div id="movie-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
            </div>
    </main>

    <div id="player-modal" class="hidden fixed inset-0 z-[200] bg-[#020617]/98 backdrop-blur-xl flex flex-col items-center justify-center p-4">
        
        <button onclick="closePlayer()" class="absolute top-6 right-6 w-12 h-12 flex items-center justify-center bg-white/5 hover:bg-red-600 rounded-full text-white transition-all duration-300 shadow-2xl z-[210]">
            <i class="fas fa-times text-2xl"></i>
        </button>

        <div class="w-full max-w-5xl flex flex-col gap-8 animate-zoom-in">
            <div class="relative w-full aspect-video bg-black rounded-[2.5rem] overflow-hidden shadow-[0_0_80px_rgba(30,58,138,0.3)] border border-white/5">
                <iframe id="main-player" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
            </div>

            <div class="text-center space-y-6">
                <div class="space-y-2">
                    <h3 id="player-title" class="text-lg md:text-2xl font-black text-white italic tracking-tight uppercase line-clamp-2 px-6"></h3>
                    <p class="text-blue-500 text-[10px] tracking-[0.5em] font-black uppercase opacity-60">Streaming MovieHub</p>
                </div>
                
                <button onclick="closePlayer()" class="inline-flex items-center gap-3 bg-white/5 hover:bg-white/10 border border-white/10 text-white px-12 py-4 rounded-2xl font-black text-[11px] tracking-[0.2em] transition-all duration-300">
                    <i class="fas fa-arrow-left text-xs"></i> KEMBALI KE BERANDA
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://apil-fy3l.vercel.app";

        function toggleDrop(id) {
            const el = document.getElementById(id);
            const isActive = el.classList.contains('active');
            document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('active'));
            if (!isActive) el.classList.add('active');
        }

        async function loadContent(endpoint = "") {
            const container = document.getElementById('movie-container');
            const title = document.getElementById('section-title');
            
            // Tutup semua dropdown pas klik kategori
            document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('active'));
            
            container.innerHTML = `<div class="col-span-full py-40 text-center"><div class="inline-block w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div><p class="mt-4 text-[10px] font-black text-slate-600 tracking-[0.3em]">SEDANG MEMUAT...</p></div>`;
            title.innerHTML = `<span class="w-1.5 h-1.5 bg-blue-600 rounded-full animate-pulse"></span> ${endpoint ? endpoint.split('/').pop().toUpperCase() : 'TERBARU'}`;

            try {
                const res = await fetch(`${API_BASE}/${endpoint}`);
                const json = await res.json();
                if (!json.data || json.data.length === 0) {
                    container.innerHTML = `<div class="col-span-full text-center py-20 text-slate-600 uppercase text-xs font-black tracking-widest">Film tidak ditemukan bosku.</div>`;
                    return;
                }

                container.innerHTML = json.data.map(m => `
                    <div class="movie-card group cursor-pointer" onclick="playMovie('${m.link}', '${m.title.replace(/'/g, "\\'")}')">
                        <div class="relative aspect-[2/3] rounded-[2.5rem] overflow-hidden bg-slate-900 border border-white/5 shadow-2xl">
                            <img src="${m.img}" alt="${m.title}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700" loading="lazy" onerror="this.src='https://via.placeholder.com/400x600/020617/475569?text=No+Image'">
                            <div class="absolute inset-0 bg-gradient-to-t from-[#020617] via-transparent opacity-90 transition-opacity duration-500 group-hover:opacity-70"></div>
                            <div class="absolute bottom-6 left-6 right-6 transform group-hover:-translate-y-2 transition-transform duration-500">
                                <p class="text-[10px] font-black leading-tight line-clamp-2 uppercase tracking-tighter text-white drop-shadow-lg">${m.title}</p>
                                <div class="w-6 h-1 bg-blue-600 mt-3 rounded-full group-hover:w-12 transition-all duration-500"></div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = `<div class="col-span-full text-center py-20 text-red-500 font-black tracking-widest text-xs uppercase">API Error: Cek Dashboard Vercel Bosku!</div>`;
            }
        }

        async function playMovie(link, title) {
            const modal = document.getElementById('player-modal');
            const player = document.getElementById('main-player');
            const pTitle = document.getElementById('player-title');
            
            modal.classList.remove('hidden');
            document.body.classList.add('stop-scroll');
            pTitle.innerText = "MENGHUBUNGKAN KE SERVER...";

            try {
                const res = await fetch(`${API_BASE}/detail?url=${encodeURIComponent(link)}`);
                const json = await res.json();
                if (json.streams && json.streams.length > 0) {
                    player.src = json.streams[0];
                    pTitle.innerText = title;
                } else {
                    pTitle.innerText = "MAAF, SERVER INI LAGI LIMIT/DOWN!";
                }
            } catch (e) {
                pTitle.innerText = "GAGAL MENGAMBIL DATA STREAM.";
            }
        }

        function closePlayer() {
            const modal = document.getElementById('player-modal');
            const player = document.getElementById('main-player');
            modal.classList.add('hidden');
            document.body.classList.remove('stop-scroll');
            player.src = ""; // Stop audio
        }

        function toggleSearch() {
            const bar = document.getElementById('search-bar');
            bar.classList.toggle('hidden');
            if(!bar.classList.contains('hidden')) document.getElementById('query').focus();
        }

        async function searchMovie() {
            const q = document.getElementById('query').value;
            if (q) loadContent(`search?q=${q}`);
        }

        // Close dropdown when clicking outside
        window.addEventListener('click', (e) => {
            if (!e.target.closest('.relative')) {
                document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('active'));
            }
        });

        // Initialize
        window.onload = () => loadContent('');
    </script>

    <style>
        .animate-zoom-in { animation: zoomIn 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</body>
</html>
